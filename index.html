  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 15px; background: #f4f6f9; }
    .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { color: #0C3C6B; text-align: center; }
    .section { margin: 25px 0; padding: 20px; background: #f8f9fa; border-radius: 10px; }
    label { display: inline-block; width: 190px; font-weight: bold; }
    input, select { padding: 10px; width: 250px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #0C3C6B; color: white; }
    .good { color: green; font-weight: bold; }
    .note { font-size: 0.9em; color: #555; margin-top: 15px; }
  </style>

  <div class="container">
    <h1>Projector Image & Lens Calculator</h1>

    <!-- 1. SCREEN SIZE -->
    <div class="section">
      <h2>1. Screen Size</h2>
      <div>
        <label>Aspect Ratio:</label>
        <select id="aspect">
          <option value="16:9">16:9</option>
          <option value="16:10" selected>16:10</option>
          <option value="4:3">4:3</option>
        </select>
      </div>
      <div>
        <label>Units:</label>
        <select id="units">
          <option value="Meters">Meters</option>
          <option value="Inches">Inches</option>
        </select>
      </div>
      <div>
        <label>Image Width:</label>
        <input type="text" id="width" value="3.000">
      </div>
      <div>
        <label>Image Height:</label>
        <input type="text" id="height" value="1.875">
      </div>
      <div>
        <label>Image Diagonal:</label>
        <input type="text" id="diagonal" value="3.538">
      </div>
    </div>

    <!-- 2. PROJECTOR & LENS -->
    <div class="section">
      <h2>2. Projector & Lens Recommendation</h2>
      <div>
        <label>Projector Model:</label>
        <select id="model"></select>
      </div>
      <div>
        <label>Projection Distance (m):</label>
        <input type="number" id="distance" value="5.0" step="0.1" placeholder="Leave blank to see all lenses">
      </div>
      <div id="lens-table" style="margin-top:15px;"></div>
    </div>

    <div class="note">
      * Change any of Width / Height / Diagonal — the others will update when you click outside or press Enter.<br>
      * Projection Distance is always in Meters.
    </div>
  </div>

    uniqueModels.forEach(m => {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m;
      modelSelect.appendChild(opt);
    });

    let lastChanged = 'width';

    function updateImageSize(changedField = null) {
      if (changedField) lastChanged = changedField;

      let w = parseFloat(document.getElementById('width').value) || 3.0;
      let h = parseFloat(document.getElementById('height').value) || 1.875;
      let d = parseFloat(document.getElementById('diagonal').value) || 3.538;
      let ratio = 9/16;

      switch(document.getElementById('aspect').value) {
        case "16:9": ratio = 9/16; break;
        case "16:10": ratio = 10/16; break;
        case "4:3": ratio = 3/4; break;
      }

      if (lastChanged === 'width') {
        h = w * ratio;
        d = Math.sqrt(w*w + h*h);
      } else if (lastChanged === 'height') {
        w = h / ratio;
        d = Math.sqrt(w*w + h*h);
      } else if (lastChanged === 'diagonal') {
        w = d / Math.sqrt(1 + ratio*ratio);
        h = w * ratio;
      }

      document.getElementById('width').value = w.toFixed(3);
      document.getElementById('height').value = h.toFixed(3);
      document.getElementById('diagonal').value = d.toFixed(3);
    }

    function applyUnitConversion() {
      const isInches = document.getElementById('units').value === "Inches";
      const conv = isInches ? 39.3701 : 1/39.3701;

      let w = parseFloat(document.getElementById('width').value) || 3.0;
      let h = parseFloat(document.getElementById('height').value) || 1.875;
      let d = parseFloat(document.getElementById('diagonal').value) || 3.538;

      document.getElementById('width').value = (w * conv).toFixed(3);
      document.getElementById('height').value = (h * conv).toFixed(3);
      document.getElementById('diagonal').value = (d * conv).toFixed(3);
    }

    // Event Listeners
    document.getElementById('width').addEventListener('blur', () => updateImageSize('width'));
    document.getElementById('height').addEventListener('blur', () => updateImageSize('height'));
    document.getElementById('diagonal').addEventListener('blur', () => updateImageSize('diagonal'));
    document.getElementById('aspect').addEventListener('change', () => updateImageSize('diagonal'));
    document.getElementById('units').addEventListener('change', () => {
      applyUnitConversion();
      renderLensTable();
    });

    modelSelect.addEventListener('change', renderLensTable);

    // Initial load
    updateImageSize('width');
    renderLensTable();
