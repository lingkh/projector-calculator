<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projector Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 15px; background: #f4f6f9; }
    .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { color: #0C3C6B; text-align: center; }
    .section { margin: 25px 0; padding: 20px; background: #f8f9fa; border-radius: 8px; }
    label { display: inline-block; width: 180px; font-weight: bold; }
    input, select { padding: 10px; width: 240px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #0C3C6B; color: white; }
    .result { font-weight: bold; color: #0C3C6B; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Projector Image & Lens Calculator</h1>

    <!-- Screen Size Section -->
    <div class="section">
      <h2>1. Screen Size</h2>
      <div>
        <label>Aspect Ratio:</label>
        <select id="aspect">
          <option value="16:9">16:9</option>
          <option value="16:10" selected>16:10</option>
          <option value="4:3">4:3</option>
        </select>
      </div>
      <div>
        <label>Units:</label>
        <select id="units">
          <option value="Meters">Meters</option>
          <option value="Inches">Inches</option>
        </select>
      </div>
      <div>
        <label>Image Width:</label>
        <input type="number" id="width" value="3.0" step="0.01">
      </div>
      <div class="result">
        <strong>Height:</strong> <span id="height">1.875</span> <span id="unit1">m</span><br>
        <strong>Diagonal:</strong> <span id="diagonal">3.538</span> <span id="unit2">m</span>
      </div>
    </div>

    <!-- Throw Distance & Lens -->
    <div class="section">
      <h2>2. Projection Distance & Lens</h2>
      <div>
        <label>Projection Distance (m):</label>
        <input type="number" id="distance" value="5.0" step="0.1">
      </div>
      <div id="lens-table"></div>
    </div>

    <p style="text-align:center; color:#666; margin-top:30px;">
      Built for <strong>Your Company Name</strong> — Results are approximate (±5%)
    </p>
  </div>

  <script>
    // Your full logic will go here (I'll expand it in the next message if you want)
    // For now, basic version is ready
  </script>
</body>
</html>
