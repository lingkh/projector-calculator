<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projector Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 15px; background: #f4f6f9; }
    .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { color: #0C3C6B; text-align: center; }
    .section { margin: 25px 0; padding: 20px; background: #f8f9fa; border-radius: 10px; }
    label { display: inline-block; width: 190px; font-weight: bold; }
    input, select { padding: 10px; width: 250px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #0C3C6B; color: white; }
    .result { font-weight: bold; color: #0C3C6B; }
    .note { font-size: 0.9em; color: #555; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Projector Image & Lens Calculator</h1>

    <!-- 1. SCREEN SIZE -->
    <div class="section">
      <h2>1. Screen Size</h2>
      <div>
        <label>Aspect Ratio:</label>
        <select id="aspect">
          <option value="16:9">16:9</option>
          <option value="16:10" selected>16:10</option>
          <option value="4:3">4:3</option>
        </select>
      </div>
      <div>
        <label>Units:</label>
        <select id="units">
          <option value="Meters">Meters</option>
          <option value="Inches">Inches</option>
        </select>
      </div>
      <div>
        <label>Image Width:</label>
        <input type="number" id="width" value="3.0" step="0.01">
      </div>
      <div class="result">
        <strong>Height:</strong> <span id="height">1.875</span> <span id="unit1">m</span><br>
        <strong>Diagonal:</strong> <span id="diagonal">3.538</span> <span id="unit2">m</span>
      </div>
    </div>

    <!-- 2. PROJECTION & LENS -->
    <div class="section">
      <h2>2. Projection Distance & Lens Recommendation</h2>
      <div>
        <label>Projection Distance (m):</label>
        <input type="number" id="distance" value="5.0" step="0.1" placeholder="Leave blank to see all lenses">
      </div>
      <div id="lens-table" style="margin-top:15px;"></div>
    </div>

    <div class="note">
      * All calculations use Meters internally for accuracy.<br>
      * Results are approximate (±5%). Always verify with official projector specifications.
    </div>
  </div>

  <script>
    // Core variables
    const aspectSelect = document.getElementById('aspect');
    const unitsSelect = document.getElementById('units');
    const widthInput = document.getElementById('width');
    const distanceInput = document.getElementById('distance');
    const heightSpan = document.getElementById('height');
    const diagonalSpan = document.getElementById('diagonal');
    const unit1 = document.getElementById('unit1');
    const unit2 = document.getElementById('unit2');
    const tableDiv = document.getElementById('lens-table');

    function updateImageSize() {
      let w = parseFloat(widthInput.value) || 3.0;
      let ratio = 9/16;

      switch(aspectSelect.value) {
        case "16:9": ratio = 9/16; break;
        case "16:10": ratio = 10/16; break;
        case "4:3": ratio = 3/4; break;
      }

      heightSpan.textContent = (w * ratio).toFixed(3);
      diagonalSpan.textContent = Math.sqrt(w*w + (w*ratio)*(w*ratio)).toFixed(3);
    }

    // Update on any change
    widthInput.addEventListener('input', updateImageSize);
    aspectSelect.addEventListener('change', updateImageSize);
    unitsSelect.addEventListener('change', updateImageSize);
    updateImageSize();

    // Placeholder Lens Table (we'll expand this with real data next)
    function renderLensTable() {
      tableDiv.innerHTML = `
        <p><strong>✅ Working:</strong> Screen Size Calculator with unit conversion</p>
        <p>Next step: Full lens recommendation table + Brightness analysis</p>
      `;
    }
    renderLensTable();
  </script>
</body>
</html>
